<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F0E8"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#C9BBA8" stroke-width="1" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Main white card -->
  <rect x="80" y="80" width="700" height="470" rx="16" fill="white" filter="drop-shadow(0 25px 50px rgba(0,0,0,0.15))"/>

  <!-- Tape on card -->
  <rect x="150" y="65" width="80" height="28" rx="2" fill="#F5F5DC" opacity="0.9" transform="rotate(-2 190 79)"/>
  <rect x="500" y="65" width="80" height="28" rx="2" fill="#F5F5DC" opacity="0.9" transform="rotate(3 540 79)"/>

  <!-- Text content -->
  <text x="130" y="180" font-family="Georgia, serif" font-size="32" fill="#C9774E">Psychotherapy &amp; Coaching</text>
  <text x="130" y="260" font-family="Georgia, serif" font-size="64" font-weight="300" fill="#1a1a1a">Design your</text>
  <text x="130" y="340" font-family="Georgia, serif" font-size="64" font-weight="300" fill="#1a1a1a">inner world</text>

  <!-- Yellow highlight behind "Design" -->
  <rect x="120" y="215" width="230" height="55" fill="#FFEB3B" opacity="0.7" transform="rotate(-1 235 242)"/>
  <text x="130" y="260" font-family="Georgia, serif" font-size="64" font-weight="300" fill="#1a1a1a">Design</text>

  <text x="130" y="420" font-family="Arial, sans-serif" font-size="24" fill="#666">Amsterdam • In-person &amp; Online</text>
  <text x="130" y="460" font-family="Arial, sans-serif" font-size="20" fill="#888">English • German • Dutch</text>

  <!-- Post-it notes on the right -->
  <!-- Yellow post-it -->
  <g transform="translate(850, 120) rotate(-5)">
    <rect width="180" height="140" rx="2" fill="#FFEB3B"/>
    <rect x="60" y="-12" width="60" height="24" rx="2" fill="white" opacity="0.7"/>
    <text x="90" y="80" font-family="Brush Script MT, cursive" font-size="28" fill="#5D4E00" text-anchor="middle">fresh ideas</text>
  </g>

  <!-- Pink post-it with heart -->
  <g transform="translate(900, 300) rotate(3)">
    <rect width="200" height="160" rx="2" fill="#F48FB1"/>
    <rect x="70" y="-12" width="60" height="24" rx="2" fill="white" opacity="0.7"/>
    <!-- Heart -->
    <path d="M100 70 C90 50, 60 55, 60 80 C60 105, 100 130, 100 130 C100 130, 140 105, 140 80 C140 55, 110 50, 100 70" fill="#E91E63"/>
    <ellipse cx="75" cy="75" rx="8" ry="10" fill="white" opacity="0.3"/>
  </g>

  <!-- Blue post-it -->
  <g transform="translate(820, 470) rotate(-3)">
    <rect width="160" height="120" rx="2" fill="#81D4FA"/>
    <rect x="50" y="-12" width="60" height="24" rx="2" fill="white" opacity="0.7"/>
    <text x="80" y="70" font-family="Brush Script MT, cursive" font-size="26" fill="#0D3C55" text-anchor="middle">your future</text>
  </g>

  <!-- Logo area -->
  <text x="1050" y="590" font-family="Georgia, serif" font-size="28" fill="#1a1a1a" text-anchor="middle">Design</text>
  <text x="1050" y="590" font-family="Georgia, serif" font-size="28" fill="#C9774E" text-anchor="middle" dx="85">Therapy</text>
</svg>
